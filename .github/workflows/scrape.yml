name: Scrape And Update

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-firefox-${{ hashFiles('**/requirements.txt') }}

      - name: Install Playwright browsers
        run: playwright install firefox

      - name: Run Pipeline
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

          git add series.csv archives/

          # If no changes, exit early
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "[bot] Scrape and update."

          # Retry loop to handle concurrent runs
          for i in {1..5}; do
            if git push; then
              echo "Push successful!"
              exit 0
            fi
            echo "Conflict detected. Forcing local files to overwrite remote..."
            git fetch origin main
            git rebase -X theirs origin/main
            sleep $((RANDOM % 5 + 1))
          done
          echo "Could not resolve conflicts after 5 attempts."
          exit 1
